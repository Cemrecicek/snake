<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.png" />
    <meta name="theme-color" content="#111111" />

    <title>Snake</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="game-container">
      <h1>Snake</h1>
      <h2 class="oyunBitti"></h2>

      <canvas id="board"></canvas>

      <h2 class="skor">Skor: 0</h2>
      <button class="baslat">Yeni Oyun</button>

      <div class="controls">
        <button class="control-btn up" data-direction="up">▲</button>
        <button class="control-btn left" data-direction="left">◀</button>
        <button class="control-btn down" data-direction="down">▼</button>
        <button class="control-btn right" data-direction="right">▶</button>
      </div>
    </main>

    <script src="./snake.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then(() => console.log("Service Worker kayıt edildi."))
            .catch((error) => console.log("Service Worker kayıt hatası:", error));
        });
      }
    </script>
  </body>
</html>
