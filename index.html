<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.png" />
    <meta name="theme-color" content="#111111" />

    <title>Snake</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="game-container">
      <h1>Snake</h1>
      <h2 class="oyunBitti"></h2>

      <canvas id="board"></canvas>

      <h2 class="skor">Skor: 0</h2>
      <button class="baslat">Yeni Oyun</button>
      <h2 class="enYuksekSkor">En Yüksek Skor: 0</h2>

      <div class="controls">
        <button class="control-btn up" data-direction="up">▲</button>
        <button class="control-btn left" data-direction="left">◀</button>
        <button class="control-btn down" data-direction="down">▼</button>
        <button class="control-btn right" data-direction="right">▶</button>
      </div>

      <section class="leaderboard">
        <h2>Global Skorlar</h2>
        <ol class="leaderboard-list"></ol>
      </section>

      <div class="modal hidden">
        <div class="modal-content">
          <h2>Kaybettiniz</h2>
          <p class="modal-score">Skor: 0</p>
          <p class="modal-high-score">En Yüksek Skor: 0</p>

          <input
            class="player-name"
            type="text"
            maxlength="20"
            placeholder="Adınız"
          />

          <button class="save-score">Skoru Kaydet</button>
          <button class="modal-restart">Tekrar Başla</button>

          <p class="save-message"></p>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./snake.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then(() => console.log("Service Worker kayıt edildi."))
            .catch((error) =>
              console.log("Service Worker kayıt hatası:", error),
            );
        });
      }
    </script>
  </body>
</html>
